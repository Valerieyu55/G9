<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>114 國中數學 3下：統計與機率</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel Standalone -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      cursor: default;
    }

    .animate-in {
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #global-loader {
      transition: opacity 0.5s ease-out;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-800 p-4 md:p-8">

  <!-- 載入動畫 (Babel 編譯期間顯示) -->
  <div id="global-loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-50">
    <svg class="animate-spin -ml-1 mr-3 h-10 w-10 text-indigo-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none"
      viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
      </path>
    </svg>
    <div class="text-xl font-bold text-slate-700 tracking-widest animate-pulse">教學模組載入中...</div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- SVGs (替換原本失效的 lucide-react 的 global 引入) ---
    const SvgIcon = ({ d, size = 20, className = "", children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {d && <path d={d} />}
        {children}
      </svg>
    );

    const RefreshCw = (p) => <SvgIcon {...p} d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m-2 0h-4m2 2v-4m4 8a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16m2 0h4m-2-2v4" />;
    const Play = (p) => <SvgIcon {...p} d="m5 3 14 9-14 9V3z" />;
    const Eye = (p) => <SvgIcon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></SvgIcon>;
    const AlertTriangle = (p) => <SvgIcon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></SvgIcon>;
    const BookOpen = (p) => <SvgIcon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></SvgIcon>;
    const ArrowRight = (p) => <SvgIcon {...p} d="M5 12h14m-7-7 7 7-7 7" />;
    const AlertCircle = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></SvgIcon>;
    const Calculator = (p) => <SvgIcon {...p}><rect width="16" height="20" x="4" y="2" rx="2" ry="2" /><line x1="8" y1="6" x2="16" y2="6" /><line x1="16" y1="14" x2="16" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" /></SvgIcon>;
    const Users = (p) => <SvgIcon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></SvgIcon>;
    const CheckCircle2 = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></SvgIcon>;
    const Coins = (p) => <SvgIcon {...p}><circle cx="8" cy="8" r="6" /><path d="M18.09 10.37A6 6 0 1 1 10.34 18" /><path d="M7 6h1v4" /><path d="m16.71 13.88.7.71-2.82 2.82" /></SvgIcon>;
    const GraduationCap = (p) => <SvgIcon {...p}><path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2v-5" /></SvgIcon>;
    const BarChart3 = (p) => <SvgIcon {...p}><path d="M3 3v18h18" /><rect width="4" height="7" x="7" y="10" rx="1" /><rect width="4" height="12" x="15" y="5" rx="1" /></SvgIcon>;
    const Dices = (p) => <SvgIcon {...p}><rect width="12" height="12" x="2" y="10" rx="2" ry="2" /><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3.12l-5.3-5.3a2.24 2.24 0 0 0-3.12 0L9.5 5.58" /><path d="M18 14h.01" /><path d="M15 17h.01" /><path d="M21 17h.01" /><path d="M18 20h.01" /><path d="M15 20h.01" /><path d="M21 20h.01" /></SvgIcon>;
    const Ticket = (p) => <SvgIcon {...p}><path d="m4.5 8 10.58-5.06a1 1 0 0 1 1.34.48L21.38 13.9a1 1 0 0 1-.48 1.34L10.32 20.3a1 1 0 0 1-1.34-.48L4.02 9.34a1 1 0 0 1 .48-1.34Z" /><path d="m13.43 3.6 2.3 4.81" /><path d="m11.43 4.5 2.3 4.81" /><path d="m9.43 5.5 2.3 4.81" /></SvgIcon>;
    const Lightbulb = (p) => <SvgIcon {...p}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5" /><path d="M9 18h6" /><path d="M10 22h4" /></SvgIcon>;

    // ==========================================
    // 單元一：資料的分析 (百分位數 & 盒狀圖)
    // ==========================================
    const StatisticsLesson = () => {
      const [rawData, setRawData] = useState("12, 18, 22, 25, 28, 30, 32, 35, 40, 42, 50, 55, 60, 65, 78");
      const [data, setData] = useState([]);
      const [stats, setStats] = useState({ min: 0, q1: 0, q2: 0, q3: 0, max: 0 });

      useEffect(() => {
        const nums = rawData.split(',')
          .map(s => parseInt(s.trim()))
          .filter(n => !isNaN(n))
          .sort((a, b) => a - b);

        if (nums.length === 0) return;

        setData(nums);

        const getQuartile = (p, arr) => {
          const n = arr.length;
          const index = n * p;
          if (Number.isInteger(index)) {
            return (arr[index - 1] + arr[index]) / 2;
          } else {
            return arr[Math.ceil(index) - 1];
          }
        };

        setStats({
          min: nums[0],
          q1: getQuartile(0.25, nums),
          q2: getQuartile(0.5, nums),
          q3: getQuartile(0.75, nums),
          max: nums[nums.length - 1]
        });
      }, [rawData]);

      return (
        <div className="space-y-6 animate-in">
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-emerald-100">
            <h2 className="text-lg font-bold text-emerald-900 mb-4 flex items-center gap-2">
              <BarChart3 size={20} className="text-emerald-600" /> 資料整理與五分位數
            </h2>
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">輸入數據 (以逗號隔開)：</label>
                <input
                  type="text"
                  value={rawData}
                  onChange={(e) => setRawData(e.target.value)}
                  className="w-full p-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all"
                />
              </div>
              <div className="flex flex-wrap gap-2 text-sm">
                {data.map((n, i) => (
                  <span key={i} className={`px-2 py-1 rounded ${n === stats.q1 || n === stats.q2 || n === stats.q3 ? 'bg-emerald-500 text-white font-bold' : 'bg-gray-100 text-gray-600'
                    }`}>
                    {n}
                  </span>
                ))}
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-emerald-100">
              <h3 className="font-bold text-gray-800 mb-4">統計量分析</h3>
              <div className="grid grid-cols-5 gap-2 text-center">
                {[
                  { label: '最小值', val: stats.min, color: 'bg-gray-100 text-gray-600' },
                  { label: 'Q1', val: stats.q1, color: 'bg-emerald-100 text-emerald-700 font-bold' },
                  { label: '中位數', val: stats.q2, color: 'bg-emerald-500 text-white font-bold' },
                  { label: 'Q3', val: stats.q3, color: 'bg-emerald-100 text-emerald-700 font-bold' },
                  { label: '最大值', val: stats.max, color: 'bg-gray-100 text-gray-600' }
                ].map((s, i) => (
                  <div key={i} className="space-y-2">
                    <div className={`p-3 rounded-xl truncate ${s.color}`}>{s.val}</div>
                    <div className="text-[10px] text-gray-400 font-medium">{s.label}</div>
                  </div>
                ))}
              </div>
              <div className="mt-6 p-4 bg-gray-50 rounded-xl text-sm space-y-2">
                <p className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> <strong>全距：</strong> {stats.max - stats.min}</p>
                <p className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> <strong>四分位距 (IQR)：</strong> {(stats.q3 - stats.q1).toFixed(1)}</p>
              </div>
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-emerald-100 min-h-[220px]">
              <h3 className="font-bold text-gray-800 mb-4 text-center">盒狀圖視覺化</h3>
              <div className="relative h-40 w-full mt-4">
                <svg width="100%" height="100%" viewBox="0 0 400 120" preserveAspectRatio="none">
                  <line x1="0" y1="100" x2="400" y2="100" stroke="#E5E7EB" strokeWidth="1" />
                  {(() => {
                    const range = stats.max - stats.min || 1;
                    const getX = (v) => ((v - stats.min) / range) * 300 + 50;
                    const minX = getX(stats.min);
                    const q1X = getX(stats.q1);
                    const q2X = getX(stats.q2);
                    const q3X = getX(stats.q3);
                    const maxX = getX(stats.max);
                    return (
                      <g>
                        <line x1={minX} y1="60" x2={q1X} y2="60" stroke="#10B981" strokeWidth="2" />
                        <line x1={q3X} y1="60" x2={maxX} y2="60" stroke="#10B981" strokeWidth="2" />
                        <line x1={minX} y1="40" x2={minX} y2="80" stroke="#10B981" strokeWidth="2" />
                        <line x1={maxX} y1="40" x2={maxX} y2="80" stroke="#10B981" strokeWidth="2" />
                        <rect x={q1X} y="30" width={q3X - q1X} height="60" fill="#ECFDF5" stroke="#10B981" strokeWidth="2" />
                        <line x1={q2X} y1="30" x2={q2X} y2="90" stroke="#059669" strokeWidth="3" />
                        <text x={minX} y="115" fontSize="10" textAnchor="middle" fill="#6B7280">{stats.min}</text>
                        <text x={q1X} y="20" fontSize="10" textAnchor="middle" fill="#059669">Q1</text>
                        <text x={q2X} y="20" fontSize="10" textAnchor="middle" fill="#059669" fontWeight="bold">Median</text>
                        <text x={q3X} y="20" fontSize="10" textAnchor="middle" fill="#059669">Q3</text>
                        <text x={maxX} y="115" fontSize="10" textAnchor="middle" fill="#6B7280">{stats.max}</text>
                      </g>
                    );
                  })()}
                </svg>
              </div>
            </div>
          </div>

          <div className="bg-emerald-50 p-6 rounded-2xl border border-emerald-200">
            <h3 className="font-bold text-emerald-900 mb-2 flex items-center gap-2"><Lightbulb size={18} /> 盒狀圖怎麼看？</h3>
            <p className="text-sm text-emerald-800 leading-relaxed">
              <strong>口訣：</strong> 左鬚看最小，右鬚看最大，中間箱子藏一半！<br />
              箱子越短代表資料越集中；箱子越長代表資料越分散。中位數靠左代表數據分布偏小，靠右代表數據分布偏大。
            </p>
          </div>
        </div>
      );
    };

    const DrawLesson = () => {
      const [mode, setMode] = useState(2);
      const [step, setStep] = useState(0);
      const [pool, setPool] = useState([]);
      const [results, setResults] = useState([null, null, null, null]);
      const [hasWon, setHasWon] = useState(false);
      const [showSummary, setShowSummary] = useState(false);

      const resetGame = () => {
        setStep(0);
        setResults([null, null, null, null]);
        setHasWon(false);
        let newPool = ['win', 'lose', 'lose', 'lose'];
        for (let i = newPool.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newPool[i], newPool[j]] = [newPool[j], newPool[i]];
        }
        setPool(newPool);
      };

      useEffect(() => { resetGame(); }, [mode]);

      const drawNext = () => {
        if (step >= 4 || (mode === 3 && hasWon)) return;
        let currentResult = null;
        let newPool = [...pool];

        if (mode === 1 || mode === 2) {
          currentResult = newPool.pop();
        } else if (mode === 3) {
          currentResult = Math.random() < 0.25 ? 'win' : 'lose';
        }

        const newResults = [...results];
        newResults[step] = currentResult;
        setResults(newResults);
        setPool(newPool);
        setStep(step + 1);
        if (currentResult === 'win') setHasWon(true);
      };

      const calculateProbability = (studentIndex) => {
        if (mode === 1) {
          if (step < 4) return 25;
          return results[studentIndex] === 'win' ? 100 : 0;
        }
        if (mode === 2) {
          if (studentIndex < step) return results[studentIndex] === 'win' ? 100 : 0;
          if (hasWon) return 0;
          return (1 / (4 - step)) * 100;
        }
        if (mode === 3) {
          if (studentIndex < step) return results[studentIndex] === 'win' ? 100 : 0;
          if (hasWon) return 0;
          return Math.pow(0.75, studentIndex - step) * 0.25 * 100;
        }
        return 0;
      };

      const getFormulaString = (studentIndex) => {
        if (mode === 1) {
          if (step < 4) return '1 / 4';
          return results[studentIndex] === 'win' ? '100% (已公開)' : '0% (已公開)';
        }
        if (mode === 2) {
          if (studentIndex < step) return results[studentIndex] === 'win' ? '100% (已中獎)' : '0% (沒中)';
          if (hasWon) return '0% (已被抽走)';
          return `1 / ${4 - step}`;
        }
        if (mode === 3) {
          if (studentIndex < step) return results[studentIndex] === 'win' ? '100% (已中獎)' : '0% (沒中)';
          if (hasWon) return '0% (已被抽走)';
          const n = studentIndex - step;
          if (n === 0) return '1 / 4';
          return `(3/4)^${n} × (1/4)`;
        }
        return '';
      };

      const getModeInfo = () => {
        switch (mode) {
          case 1: return { title: "模式 A：盲抽齊開 (最完美公平)", desc: "不提前公開，沒有新資訊產生，大家的預期機率始終不變，毫無額外壓力。", math: "P = 1/4 = 25% (不變)" };
          case 2: return { title: "模式 B：邊抽邊開 (心理不公平)", desc: "後抽者的「條件機率」會隨已知資訊劇烈震盪！這就是直覺覺得不公平的來源。", math: "P(後抽) = 1 / 剩餘籤數" };
          case 3: return { title: "模式 C：放回抽籤 (數學不公平)", desc: "越前面抽的人，越有機會在獎品被拿走前先出手。這是標準的等比數列遞減。", math: "P(第 n 人) = (3/4)^(n-1) × (1/4)" };
          default: return {};
        }
      };

      const modeInfo = getModeInfo();

      return (
        <div className="space-y-6 animate-in">
          <div className="bg-white p-4 rounded-xl shadow-sm border border-indigo-100 flex flex-wrap justify-center md:justify-end gap-2">
            <button onClick={() => setMode(1)} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${mode === 1 ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>模式 A: 盲抽齊開 (公平)</button>
            <button onClick={() => setMode(2)} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${mode === 2 ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>模式 B: 邊抽邊開 (壓力)</button>
            <button onClick={() => setMode(3)} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${mode === 3 ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>模式 C: 放回抽籤 (不公)</button>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 space-y-6">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-indigo-100">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-lg font-bold text-gray-800">抽籤實況 (4 人搶 1 籤)</h2>
                  <div className="flex gap-3">
                    <button onClick={drawNext} disabled={step >= 4 || (mode === 3 && hasWon)} className="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 text-sm font-medium">
                      <Play size={16} /> {step < 4 ? `第 ${step + 1} 位抽籤` : '結束'}
                    </button>
                    <button onClick={resetGame} className="flex items-center gap-2 bg-gray-100 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-200 text-sm font-medium">
                      <RefreshCw size={16} /> 重置
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {[0, 1, 2, 3].map((i) => {
                    const prob = calculateProbability(i);
                    const isDrawn = i < step;
                    const isRevealed = mode !== 1 || step === 4;
                    const result = results[i];

                    return (
                      <div key={i} className={`p-4 rounded-xl border-2 transition-all duration-300 ${isDrawn && isRevealed && result === 'win' ? 'border-green-500 bg-green-50' :
                        isDrawn && isRevealed && result === 'lose' ? 'border-gray-200 bg-gray-50 opacity-60' :
                          i === step && !hasWon ? 'border-indigo-400 bg-indigo-50 shadow-md ring-4 ring-indigo-50' :
                            'border-gray-200 bg-white'
                        }`}>
                        <div className="flex justify-between items-center mb-3">
                          <span className="font-bold text-gray-700">學生 {i + 1}</span>
                          {isDrawn ? (
                            isRevealed ? (
                              result === 'win' ? <span className="text-green-600 font-bold bg-green-100 px-2 py-1 rounded text-xs">當選</span> : <span className="text-gray-500 bg-gray-200 px-2 py-1 rounded text-xs">沒中</span>
                            ) : <span className="text-indigo-600 font-bold bg-indigo-100 px-2 py-1 rounded text-xs">已抽(未看)</span>
                          ) : <span className="text-gray-400 text-xs">等待中...</span>}
                        </div>
                        <div className="space-y-2 mt-2">
                          <div className="space-y-1">
                            <div className="flex justify-between text-xs items-center">
                              <span className="text-gray-500 font-bold">預期勝率</span>
                              <span className={`text-base font-black ${prob > 26 ? 'text-red-500 tracking-tighter' : prob === 25 ? 'text-indigo-600' : 'text-gray-600'}`}>{prob.toFixed(1)}%</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
                              <div className={`h-1.5 rounded-full transition-all duration-500 ${prob === 100 ? 'bg-green-500' : prob > 26 ? 'bg-red-500' : prob === 0 ? 'bg-gray-400' : 'bg-indigo-500'}`} style={{ width: `${prob}%` }}></div>
                            </div>
                          </div>
                          <div className="bg-slate-50 border border-slate-200 rounded-lg p-2 flex justify-between items-center text-[11px]">
                            <span className="text-slate-400 font-bold">邏輯</span>
                            <span className="font-mono font-black text-indigo-700 tracking-widest bg-indigo-50/50 px-1.5 py-0.5 rounded">{getFormulaString(i)}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            <div className="flex flex-col gap-6 h-full">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-indigo-100 shrink-0">
                <h3 className="font-bold text-indigo-900 mb-2 flex items-center gap-2"><Eye size={18} /> 情境分析</h3>
                <h4 className="font-bold text-gray-800 text-sm mb-1">{modeInfo.title}</h4>
                <p className="text-gray-600 text-xs leading-relaxed mb-3">{modeInfo.desc}</p>
                <div className="bg-indigo-50 p-2 rounded-lg block text-xs text-indigo-700 font-mono font-bold text-center">{modeInfo.math}</div>

              整體顏色比例會在「大樣本」中趨近於此理論值，但單包內部的顏色數量分佈，仍會隨機器封裝而有差異喔！
            </p>

            <div className="bg-white p-6 rounded-2xl border border-amber-100 shadow-sm mb-8 relative z-10">
              <h3 className="text-sm font-black text-slate-700 mb-4 text-center tracking-widest uppercase">🏭 官方生產配方比例 (理論機率)</h3>
              <div className="grid grid-cols-2 md:grid-cols-6 gap-3">
                {factoryDist.map(f => (
                  <div key={f.color} className={`flex flex-col items-center p-3 rounded-xl border border-slate-100 shadow-sm hover:-translate-y-1 transition-transform`}>
                    <div className={`w-10 h-10 rounded-full ${f.bg} shadow-md mb-2 flex items-center justify-center text-white/50 font-black text-sm`}>m</div>
                    <span className="text-xs font-bold text-slate-500 mb-1">{f.color}</span>
                    <span className="text-base font-black text-slate-800">{f.rate}%</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex flex-col lg:flex-row gap-6 relative z-10">
              <div className="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                  <h3 className="font-black text-slate-800 text-lg">撕開一包 M&M's (模擬 50 顆)</h3>
                  <button onClick={openBag} className={`text-white px-5 py-2.5 rounded-xl text-sm font-black flex items-center gap-2 shadow-md transition-all active:scale-95 ${bag ? 'bg-slate-800 hover:bg-slate-700' : 'bg-amber-500 hover:bg-amber-600 animate-pulse'}`}>
                    <RefreshCw size={18} className={bag ? "" : "animate-spin"} />
                    {bag ? "再開一包看看" : "點擊馬上開包"}
                  </button>
                </div>

                {bag ? (
                  <div className="space-y-4 animate-in">
                    {factoryDist.map(f => {
                      const count = bag[f.color];
                      const actualRate = (count / 50) * 100;
                      const expectedRate = f.rate;
                      const diff = (actualRate - expectedRate).toFixed(1);
                      const isMore = diff > 0;

                      return (
                        <div key={f.color} className="flex items-center gap-4">
                          <div className={`w-8 h-8 rounded-full ${f.bg} shrink-0 flex items-center justify-center text-white/50 text-xs font-black shadow-inner`}>m</div>
                          <div className="flex-1 bg-slate-100 rounded-full h-4 overflow-hidden shadow-inner">
                            <div className={`h-full ${f.bg} transition-all duration-1000`} style={{ width: `${actualRate}%` }}></div>
                          </div>
                          <div className="w-24 text-right flex flex-col justify-center">
                            <span className="font-black text-slate-700 text-sm">{count} 顆 <span className="text-xs text-slate-400 font-bold ml-1">({actualRate.toFixed(0)}%)</span></span>
                            <span className={`text-[10px] font-bold ${isMore ? 'text-green-500' : 'text-red-400'}`}>{isMore ? '+' : ''}{diff}% 誤差</span>
                          </div>
                        </div>
                      )
                    })}
                  </div>
                ) : (
                  <div className="h-48 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center text-slate-400 bg-slate-50 gap-3">
                    <div className="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center"><Dices size={32} className="text-slate-300" /></div>
                    <span className="font-bold">點擊上方按鈕，看看你這包的運氣如何！</span>
                  </div>
                )}
              </div>

              <div className="lg:w-72 bg-slate-800 text-white p-6 rounded-2xl shadow-xl flex flex-col justify-center transform transition-all hover:scale-[1.02]">
                <h3 className="font-black text-amber-400 mb-3 flex items-center gap-2 text-lg"><BookOpen size={20} /> 大數法則</h3>
                <p className="text-sm text-slate-300 leading-relaxed font-medium">
                  當你只點開一包 (50顆樣本) 時，比例通常不會完美吻合工廠設定！這叫做<strong>「小樣本變異 / 隨機誤差」</strong>。<br /><br />
                  <strong>大數法則 (Law of Large Numbers)</strong> 告訴我們：如果你把全班同學的 1,000 包全部倒在一起算，整體的顏色比例就會近乎完美地貼齊原廠設定的理論機率喔！
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('stats');

      useEffect(() => {
        const loader = document.getElementById('global-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }, []);

      return (
        <div className="max-w-5xl mx-auto space-y-8 animate-in">

          {/* Header */}
          <header className="text-center space-y-4">
            <div className="inline-flex items-center justify-center p-3 bg-indigo-100 rounded-full mb-2">
              <GraduationCap className="w-10 h-10 text-indigo-700" />
            </div>
            <h1 className="text-3xl md:text-4xl font-black text-slate-900 tracking-tight">114 國中數學 3下：統計與機率</h1>
            <p className="text-lg text-slate-500 font-medium tracking-tight">看透數據與隨機的真相，培養真實世界的數學邏輯</p>
          </header>

          {/* Navigation */}
          <nav className="flex flex-col md:flex-row justify-center gap-2 md:gap-3 border-b border-slate-200 pb-2 flex-wrap">
            {[
              { id: 'stats', label: '資料分析', sub: '(百分位數)', icon: BarChart3, color: 'emerald' },
              { id: 'draw', label: '抽籤公平性', sub: '(條件機率)', icon: Dices, color: 'indigo' },
              { id: 'scratch', label: '刮刮樂陷阱', sub: '(期望值)', icon: Ticket, color: 'red' },
              { id: 'fun', label: '機率冷知識', sub: '(大數法則)', icon: Lightbulb, color: 'amber' }
            ].map((tab) => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`flex items-center justify-center gap-2 px-4 md:px-6 py-3 md:py-4 rounded-t-2xl font-black text-sm md:text-lg transition-all border-b-4 ${activeTab === tab.id
                  ? `bg-${tab.color}-600 text-white border-${tab.color}-800 shadow-lg transform -translate-y-1`
                  : `bg-white text-slate-400 border-transparent hover:bg-${tab.color}-50 hover:text-${tab.color}-600`
                  }`}
              >
                <tab.icon size={20} className="w-5 h-5 md:w-6 md:h-6" /> <span className="hidden sm:inline">單元：</span>{tab.label} <span className="text-[10px] font-medium opacity-70 ml-1 block sm:inline">{tab.sub}</span>
              </button>
            ))}
          </nav>

          {/* Content */}
          <main className="transition-all duration-500">
            {activeTab === 'stats' && <StatisticsLesson />}
            {activeTab === 'draw' && <DrawLesson />}
            {activeTab === 'scratch' && <ScratchLesson />}
            {activeTab === 'fun' && <FunFactsLesson />}
          </main>

          <footer className="pt-12 pb-8 text-center text-slate-400 text-xs font-medium">
            &copy; 114 國中數學教學資源箱 - 生活化數學素養教材
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>

</html>
